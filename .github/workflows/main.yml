- name: Triển khai lên DevOps Classroom
  run: |
    REPO="${{ secrets.DOCKER_USERNAME }}/duaanjava"
    CONTAINER_PORT=80

    echo "Deploying image: $REPO:latest"
    echo "Container port: $CONTAINER_PORT"

    RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
    "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=1&container_port=$CONTAINER_PORT&strict_container_port=1")

    BODY=$(echo "$RESPONSE" | sed "$d")
    CODE=$(echo "$RESPONSE" | tail -n1)

    echo "Webhook HTTP: $CODE"

    if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
      echo "❌ Deploy thất bại"
      echo "::group::Chi tiết webhook JSON"
      echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
      echo "::endgroup::"
      exit 1
    fi

    echo "✅ Deploy thành công"
